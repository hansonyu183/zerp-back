services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDRESS: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}?sslmode=disable
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:4173,http://localhost:4173}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5s}
      DATABASE_HEALTH_TIMEOUT: ${DATABASE_HEALTH_TIMEOUT:-2s}
      HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-5s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      APP_SESSION_COOKIE_NAME: ${APP_SESSION_COOKIE_NAME:-zerp_session}
      APP_SESSION_COOKIE_SECURE: ${APP_SESSION_COOKIE_SECURE:-true}
      APP_SESSION_COOKIE_SAME_SITE: ${APP_SESSION_COOKIE_SAME_SITE:-lax}
      APP_SESSION_IDLE_TIMEOUT: ${APP_SESSION_IDLE_TIMEOUT:-30m}
      APP_SESSION_ABSOLUTE_TIMEOUT: ${APP_SESSION_ABSOLUTE_TIMEOUT:-12h}
      APP_SIGNIN_LOCK_THRESHOLD: ${APP_SIGNIN_LOCK_THRESHOLD:-5}
      APP_SIGNIN_LOCK_DURATION: ${APP_SIGNIN_LOCK_DURATION:-15m}
      APP_PASSWORD_MIN_LENGTH: ${APP_PASSWORD_MIN_LENGTH:-12}
      ATTACHMENT_STORAGE_ROOT: /var/lib/zerp/attachments
      ATTACHMENT_UPLOAD_TOKEN_TTL: ${ATTACHMENT_UPLOAD_TOKEN_TTL:-15m}
      ATTACHMENT_DOWNLOAD_TOKEN_TTL: ${ATTACHMENT_DOWNLOAD_TOKEN_TTL:-5m}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - attachment-data:/var/lib/zerp/attachments
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:9.16
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?set PGADMIN_DEFAULT_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
      PGADMIN_DISABLE_POSTFIX: "1"
      PGADMIN_LISTEN_PORT: "5050"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGPASS_FILE: /run/secrets/postgres_pgpass
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:5050"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
    secrets:
      - pgadmin_password
      - postgres_pgpass
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

secrets:
  pgadmin_password:
    file: ${PGADMIN_PASSWORD_FILE:?set PGADMIN_PASSWORD_FILE in .env}
  postgres_pgpass:
    file: ${PGADMIN_PGPASS_FILE:?set PGADMIN_PGPASS_FILE in .env}

volumes:
  postgres-data:
  pgadmin-data:
  attachment-data:
